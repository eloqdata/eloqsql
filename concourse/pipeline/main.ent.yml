resources:
- name: eloqsql_src
  type: git
  check_every: 3m
  source:
    branch: eloq-10.6.10
    uri: git@github.com:eloqdata/eloqsql.git
    private_key: ((git-key))

- name: logservice_src
  type: git
  check_every: 3m
  source:
    branch: main
    uri: git@github.com:eloqdata/eloq_log_service.git
    private_key: ((git-key))

- name: eloq_test_src
  type: git
  source:
    branch: main
    uri: git@github.com:eloqdata/eloq-test.git
    private_key: ((git-key))

- name: raft_host_manager_src
  type: git
  check_every: 3m
  source:
    branch: main
    uri: git@github.com:eloqdata/raft_host_manager.git
    private_key: ((git-key))

- name: mono_ubuntu_2204
  type: registry-image
  source:
    repository: monographdb/monograph-dev-ci-ubuntu2204
    username: monographdb
    password: ((docker-secret-key))

jobs:
- name: compile-test
  build_log_retention:
    builds: 500
  serial: true
  plan:
  - in_parallel:
      steps:
      - get: eloqsql_src
        trigger: true
      - get: logservice_src
        trigger: true
      - get: raft_host_manager_src
        trigger: true
      - get: eloq_test_src
        trigger: true
      - get: mono_ubuntu_2204
  - task: compile-test-task
    image: mono_ubuntu_2204
    file: eloqsql_src/concourse/tasks/main.ent.yml
    params:
      ELOQ_AWS_ACCESS_KEY_ID: ((minio-access-key))
      ELOQ_AWS_REGION: ((aws-region))
      ELOQ_AWS_SECRET_KEY: ((minio-secret-key))
      MINIO_ENDPOINT_URL: ((minio-endpoint))
    privileged: true

resources:
- name: eloqsql_src_main
  type: git
  source:
    branch: eloq-10.6.10
    uri: git@github.com:eloqdata/eloqsql.git
    private_key: ((git-key))

- name: image_ubuntu2004_main
  type: registry-image
  source:
    repository: eloqdata/eloq-build-ubuntu2004

- name: image_ubuntu2204_main
  type: registry-image
  source:
    repository: eloqdata/eloq-build-ubuntu2204

- name: image_ubuntu2404_main
  type: registry-image
  source:
    password: ((docker-secret-key))
    repository: eloqdata/eloq-dev-ci-ubuntu2404
    username: eloqdata
    tag: latest

- name: image_centos7_main
  type: registry-image
  source:
    repository: eloqdata/eloq-dev-ci-centos7

- name: logservice_src_main
  type: git
  source:
    branch: main
    private_key: ((git-key))
    uri: git@github.com:eloqdata/eloq_log_service.git

- name: raft_host_manager_src_main
  type: git
  source:
    branch: main
    private_key: ((git-key))
    uri: git@github.com:eloqdata/raft_host_manager.git

- name: eloqstore_src_main
  type: git
  source:
    branch: main
    private_key: ((git-key))
    uri: git@github.com:eloqdata/eloqstore.git

jobs:
- name: ubuntu2004-main
  plan:
  - in_parallel:
      limit: 2
      steps:
      - get: eloqsql_src
        resource: eloqsql_src_main
      - get: logservice_src
        resource: logservice_src_main
      - get: raft_host_manager_src
        resource: raft_host_manager_src_main
      - get: eloqstore_src
        resource: eloqstore_src_main
      - get: image_ubuntu2004
        resource: image_ubuntu2004_main

  - task: build-eloqdss-rocksdb-cloud-s3-type
    file: eloqsql_src/concourse/tasks/build_nightly_tarball.yml
    image: image_ubuntu2004
    params:
      GIT_SSH_KEY: ((git-key))
      AWS_ACCESS_KEY_ID: ((aws_access_key_id))
      AWS_DEFAULT_REGION: ((aws-region))
      AWS_SECRET_ACCESS_KEY: ((aws_secret_access_key))
      BUILD_LOG_SRV: "true"
      BUILD_TYPE: RelWithDebInfo
      DATA_STORE_TYPE: ELOQDSS_ROCKSDB_CLOUD_S3
      OUT_NAME: nightly
      WITH_LOG_STATE: ROCKSDB_CLOUD_S3
      CLOUDFRONT_DIST: ((cloudfront-dist))

  - task: build-eloqdss-rocksdb-type
    file: eloqsql_src/concourse/tasks/build_nightly_tarball.yml
    image: image_ubuntu2004
    params:
      GIT_SSH_KEY: ((git-key))
      AWS_ACCESS_KEY_ID: ((aws_access_key_id))
      AWS_DEFAULT_REGION: ((aws-region))
      AWS_SECRET_ACCESS_KEY: ((aws_secret_access_key))
      BUILD_LOG_SRV: "true"
      BUILD_TYPE: RelWithDebInfo
      DATA_STORE_TYPE: ELOQDSS_ROCKSDB
      OUT_NAME: nightly
      WITH_LOG_STATE: ROCKSDB
      CLOUDFRONT_DIST: ((cloudfront-dist))

  - task: build-eloqdss-eloqstore-type
    file: eloqsql_src/concourse/tasks/build_nightly_tarball.yml
    image: image_ubuntu2004
    params:
      GIT_SSH_KEY: ((git-key))
      AWS_ACCESS_KEY_ID: ((aws_access_key_id))
      AWS_DEFAULT_REGION: ((aws-region))
      AWS_SECRET_ACCESS_KEY: ((aws_secret_access_key))
      BUILD_LOG_SRV: "true"
      BUILD_TYPE: RelWithDebInfo
      DATA_STORE_TYPE: ELOQDSS_ELOQSTORE
      OUT_NAME: nightly
      WITH_LOG_STATE: ROCKSDB_CLOUD_S3
      CLOUDFRONT_DIST: ((cloudfront-dist))

  serial: true


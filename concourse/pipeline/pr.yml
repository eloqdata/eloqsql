resource_types:
- name: pull-request
  type: docker-image
  source:
    repository: teliaoss/github-pr-resource

resources:
- name: mariadb_pr
  type: pull-request
  check_every: 3m
  source:
    repository: monographdb/mariadb
    base_branch: "eloq-10.6.10"
    ignore_drafts: true
    access_token: ((git-token))

- name: mono_src
  type: git
  source:
    branch: main
    uri: git@github.com:monographdb/eloq_engine_for_mariadb.git
    private_key: ((git-key))

- name: eloq_metrics_src
  type: git
  source:
    branch: main
    uri: git@github.com:monographdb/eloq-metrics.git
    private_key: ((git-key))

- name: txservice_src
  type: git
  source:
    branch: main
    uri: git@github.com:monographdb/tx_service.git
    private_key: ((git-key))

- name: logservice_src
  type: git
  source:
    branch: main
    uri: git@github.com:monographdb/log_service.git
    private_key: ((git-key))

- name: mono_test_src
  type: git
  source:
    branch: main
    uri: git@github.com:monographdb/eloq-test.git
    private_key: ((git-key))

- name: raft_host_manager_src
  type: git
  source:
    branch: main
    uri: git@github.com:monographdb/raft_host_manager.git
    private_key: ((git-key))

- name: mono_ubuntu_2004
  type: registry-image
  source:
    repository: monographdb/monograph-dev-ci-ubuntu2004
    username: monographdb
    password: ((docker_hub_pass))

jobs:
- name: compile-test
  build_log_retention:
    builds: 500
  serial: true
  plan:
  - in_parallel:
      steps:
      - get: mono_src
      - get: eloq_metrics_src
      - get: txservice_src
      - get: logservice_src
      - get: mono_test_src
      - get: raft_host_manager_src
      - get: mariadb_pr
        trigger: true
        version: every
      - get: mono_ubuntu_2004
  - put: mariadb_pr
    params:
      path: mariadb_pr
      status: pending
  - task: compile-test-task
    image: mono_ubuntu_2004
    file: mono_src/concourse/tasks/compile_test_mariadb.yml
    vars:
      cass-host: ((cassandra-host))
    privileged: true
    on_failure:
      put: mariadb_pr
      params:
        path: mariadb_pr
        status: failure
  - put: mariadb_pr
    params:
      path: mariadb_pr
      status: success

